name: iOS Build (xcodebuild)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Expo packages
        run: |
          npx expo install expo-notifications

      - name: Run Expo Prebuild
        run: |
          npx expo prebuild --platform ios --clean
          ls -la ios/

      - name: Install CocoaPods (after prebuild)
        run: |
          if [ -f "ios/Podfile" ]; then
            cd ios && pod install && cd ..
          fi

      - name: Build iOS App (unsigned)
        run: |
          cd ios
          WORKSPACE=$(ls *.xcworkspace 2>/dev/null | head -1)
          echo "Building workspace: $WORKSPACE"
          xcodebuild -workspace "$WORKSPACE" -scheme app \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath ../build/app.xcarchive \
            archive

      - name: Export IPA
        run: |
          mkdir -p build
          # Create minimal export options plist for unsigned build
          cat > build/exportOptions.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>method</key>
    <string>app-store</string>
    <key>signingStyle</key>
    <string>automatic</string>
</dict>
</plist>
EOF
          xcodebuild -exportArchive \
            -archivePath build/app.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist build/exportOptions.plist

          ls -la build/
          if [ -f "build/app.ipa" ]; then
            mv build/app.ipa build/zhongkao-mentor.ipa
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: zhongkao-mentor-ipa
          path: build/zhongkao-mentor.ipa
          retention-days: 5