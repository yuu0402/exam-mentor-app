name: iOS Build (xcodebuild)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CocoaPods
        run: |
          if [ -f "ios/Podfile" ]; then
            cd ios && pod install && cd ..
          fi

      - name: Install Expo packages
        run: |
          npx expo install expo-notifications

      - name: Run Expo Prebuild
        run: |
          npx expo prebuild --platform ios --clean
          ls -la ios/

      - name: Build iOS App (unsigned)
        run: |
          cd ios
          xcodebuild -workspace *.xcworkspace -scheme app \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath ../build/app.xcarchive \
            archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/app.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist /dev/null \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

          ls -la build/
          if [ -f "build/app.ipa" ]; then
            mv build/app.ipa build/zhongkao-mentor.ipa
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: zhongkao-mentor-ipa
          path: build/zhongkao-mentor.ipa
          retention-days: 5